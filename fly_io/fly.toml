# fly.toml — Fly.io deployment configuration for the MCP server benchmark
# Deploy with: fly launch (first time) or fly deploy (updates)

app = "mcp-benchmark-fly-io"
primary_region = "cdg"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
